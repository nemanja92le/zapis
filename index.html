<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapis</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #5B7FFF 0%, #8B5CF6 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 42px;
            color: #1F2937;
            margin-bottom: 12px;
        }

        p {
            font-size: 18px;
            color: #6B7280;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .links a {
            display: block;
            padding: 16px;
            border-radius: 14px;
            background: #5B7FFF;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .links a:hover {
            background: #476CF2;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 40px;
            color: #9CA3AF;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .card {
                padding: 32px 24px;
            }

            h1 {
                font-size: 34px;
            }

            p {
                font-size: 16px;
            }

            .icon {
                font-size: 52px;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <div class="icon">📖</div>

    <h1>Zapis</h1>

    <p>
        Welcome to the official website for <strong>Zapis</strong>, your private
        journal and mood tracker. Here you can access our Privacy Policy,
        Terms of Use, and Support information.
    </p>

    <div class="links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Use</a>
        <a href="support.html">Support</a>
    </div>

    <footer>
        © 2026 Zapis. All rights reserved.
    </footer>

</div>

</body>
</html>
